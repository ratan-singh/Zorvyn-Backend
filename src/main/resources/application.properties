# ═══════════════════════════════════════════════════════════════
# Server Configuration
# ═══════════════════════════════════════════════════════════════
server.port=8080

# ═══════════════════════════════════════════════════════════════
# Jackson Serialization
# ═══════════════════════════════════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false

# ═══════════════════════════════════════════════════════════════
# PostgreSQL DataSource
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_dashboard
spring.datasource.username=esp
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ═══════════════════════════════════════════════════════════════
# JPA / Hibernate
# ═══════════════════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ═══════════════════════════════════════════════════════════════
# JWT Configuration
# ═══════════════════════════════════════════════════════════════
# 256-bit base64-encoded secret key for HS256 signing
jwt.secret-key=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHpvcnZ5bg==
# Token validity: 24 hours in milliseconds
jwt.expiration-ms=86400000

# ═══════════════════════════════════════════════════════════════
# SpringDoc OpenAPI / Swagger UI
# ═══════════════════════════════════════════════════════════════
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.doc-expansion=none

# ═══════════════════════════════════════════════════════════════
# Seed Data
# ═══════════════════════════════════════════════════════════════
# Activate the "seed" profile to populate the database with demo data:
#   mvn spring-boot:run -Dspring-boot.run.profiles=seed

# ═══════════════════════════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════════════════════════
logging.level.com.zorvyn.financedashboard=INFO
logging.level.org.springframework.security=WARN

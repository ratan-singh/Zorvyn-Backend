# ═══════════════════════════════════════════════════════════════
# Server Configuration
# ═══════════════════════════════════════════════════════════════
# Railway injects PORT; falls back to 8080 for local dev
server.port=${PORT:8080}

# ═══════════════════════════════════════════════════════════════
# Jackson Serialization
# ═══════════════════════════════════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false

# ═══════════════════════════════════════════════════════════════
# PostgreSQL DataSource
# ═══════════════════════════════════════════════════════════════
# Override via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD env vars (Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_dashboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:esp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ═══════════════════════════════════════════════════════════════
# JPA / Hibernate
# ═══════════════════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ═══════════════════════════════════════════════════════════════
# JWT Configuration
# ═══════════════════════════════════════════════════════════════
# Override via JWT_SECRET_KEY / JWT_EXPIRATION_MS env vars (Railway)
jwt.secret-key=${JWT_SECRET_KEY:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHpvcnZ5bg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ═══════════════════════════════════════════════════════════════
# SpringDoc OpenAPI / Swagger UI
# ═══════════════════════════════════════════════════════════════
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.doc-expansion=none

# ═══════════════════════════════════════════════════════════════
# Seed Data
# ═══════════════════════════════════════════════════════════════
# Activate the "seed" profile to populate the database with demo data.
# Set SPRING_PROFILES_ACTIVE=seed in Railway env vars to enable.

# ═══════════════════════════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════════════════════════
logging.level.com.zorvyn.financedashboard=INFO
logging.level.org.springframework.security=WARN
